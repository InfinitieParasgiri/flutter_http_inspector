name: flutter_http_inspector
description: >
  A Flutter debug overlay that intercepts HTTP requests, shows errors,
  and lets you copy cURL commands. Supports Dio, http package, and manual logging.
  Works as a floating button overlay in any Flutter app — zero config.
version: 0.1.0
homepage: https://github.com/yourusername/flutter_http_inspector

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: '>=4.0.0 <6.0.0'
  http: '>=0.13.0 <2.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
